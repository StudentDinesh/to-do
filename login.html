<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Login & Signup</title>
    <link rel="stylesheet" href="auth-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo/Brand -->
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fas fa-list-check"></i>
                </div>
                <h1>Todo App</h1>
                <p class="tagline">Stay organized and productive</p>
            </div>

            <!-- Login Form -->
            <div class="auth-form" id="loginForm">
                <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginUsername">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" id="loginUsername" name="username" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-right-to-bracket"></i> Login
                    </button>

                    <div class="error-message" id="loginError"></div>
                </form>

                <p class="auth-toggle">
                    Don't have an account? 
                    <a href="#" onclick="toggleForms(); return false;">
                        <i class="fas fa-user-plus"></i> Sign Up
                    </a>
                </p>
            </div>

            <!-- Signup Form -->
            <div class="auth-form hidden" id="signupForm">
                <h2><i class="fas fa-user-plus"></i> Sign Up</h2>
                <form id="signupFormElement">
                    <div class="form-group">
                        <label for="signupUsername">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" id="signupUsername" name="username" placeholder="Choose a username" required>
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" id="signupEmail" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" id="signupPassword" name="password" placeholder="At least 6 characters" required>
                        <small><i class="fas fa-info-circle"></i> Minimum 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-check"></i> Create Account
                    </button>

                    <div class="error-message" id="signupError"></div>
                    <div class="success-message" id="signupSuccess"></div>
                </form>

                <p class="auth-toggle">
                    Already have an account? 
                    <a href="#" onclick="toggleForms(); return false;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                </p>
            </div>
        </div>

        <!-- Background decoration -->
        <div class="auth-background">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="auth-script.js"></script>
</body>
</html>
